name: Build, Test & Push Chocolatey Package

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test Package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build package
        shell: pwsh
        run: choco pack

      - name: Install package
        shell: pwsh
        run: choco install p4v --source="'.;https://chocolatey.org/api/v2'" -dvy

      - name: Uninstall package
        shell: pwsh
        run: choco uninstall p4v -dvy

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: "*.nupkg"

  push:
    name: Push to Chocolatey
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Download nupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Check if version exists on Chocolatey
        id: version-check
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Filter *.nupkg | Select-Object -First 1
          # Extract version from filename: p4v.2025.4.2886649.nupkg → 2025.4.2886649
          $version = $pkg.BaseName -replace '^p4v\.', ''
          Write-Host "Package version: $version"

          $url = "https://community.chocolatey.org/api/v2/Packages()?`$filter=Id eq 'p4v' and Version eq '$version'"
          Write-Host "Checking Chocolatey API: $url"
          try {
            $result = Invoke-RestMethod -Uri $url -UseBasicParsing
            if ($result) {
              Write-Host "Version $version already exists on Chocolatey. Skipping push."
              "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            } else {
              Write-Host "Version $version not found on Chocolatey. Will push."
              "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            }
          } catch {
            Write-Error "Could not query Chocolatey API: $_. Aborting to prevent duplicate push."
            exit 1
          }

      - name: Push to Chocolatey.org
        if: steps.version-check.outputs.exists != 'true'
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Filter *.nupkg | Select-Object -First 1
          Write-Host "Pushing $($pkg.Name) to Chocolatey.org..."
          choco push $pkg.Name --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }}
